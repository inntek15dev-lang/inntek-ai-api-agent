name: CI/CD AgentiX - Preprod

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository }}-api
  IMAGE_FRONT: ghcr.io/${{ github.repository }}-front

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Log in al GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./back
          file: ./back/Dockerfile.back
          push: true
          tags: ${{ env.IMAGE_API }}:latest

      - name: Build y Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front
          file: ./front/Dockerfile.front
          push: true
          tags: ${{ env.IMAGE_FRONT }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Copiar docker-compose al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/DOCKERS-PREPROD/AGENTIX/"
          overwrite: true

      - name: Ejecutar despliegue vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/DOCKERS-PREPROD/AGENTIX
            
            # Login en el registro de GitHub
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Actualizar imágenes y reiniciar contenedores
            docker compose pull
            docker compose up -d
            
            # --- Automatización de Base de Datos ---
            echo "Esperando 15 segundos a que los servicios estabilicen..."
            sleep 15
            
            # Asegurar consistencia del esquema (Añadir columnas faltantes)
            echo "Verificando consistencia del esquema..."
            docker exec agentix_api node scripts/ensure_schema.js
            
            # Ejecutamos TU script de seed directamente (según tu estructura src/seed.js)
            echo "Poblando base de datos con script personalizado..."
            docker exec agentix_api node src/seed.js
            
            # Limpieza de imágenes antiguas para optimizar espacio
            docker image prune -f
            
            echo "🚀 Sistema desplegado y base de datos actualizada."
